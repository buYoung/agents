name: npm publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 이미 검증된 GitHub Release 태그 (예: v0.1.2)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    environment: npm-publish
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: 신뢰할 수 있는 배포용 npm 준비
        run: |
          npm install --global npm@11.5.1
          NPM_VERSION="$(npm --version)"
          test "$NPM_VERSION" = "11.5.1"
      - name: GitHub Release와 npm 묶음 검증
        env:
          AGENTS_RELEASE_PUBLIC_KEY_BASE64: ${{ vars.AGENTS_RELEASE_PUBLIC_KEY_BASE64 }}
        run: node scripts/release/verify.mjs --remote --tag "$RELEASE_TAG" --require-signature --npm-package-directory "$RUNNER_TEMP/agents-npm-package"
      - name: 이미 공개된 버전 확인
        run: |
          VERSION="$RELEASE_TAG"
          VERSION=${VERSION#v}
          if npm view "@livteam/agents-cli@$VERSION" version >/dev/null 2>&1; then
            echo "npm에 이미 공개된 버전입니다: $VERSION"
            exit 1
          fi
      - name: 검증한 npm 묶음 공개
        run: |
          DIRECTORY="$RUNNER_TEMP/agents-npm-package"
          npm pack --dry-run "$DIRECTORY"
          npm publish --access public "$DIRECTORY"
